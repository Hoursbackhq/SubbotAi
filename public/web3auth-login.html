<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SubBot — Web3Auth Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:#10141a;color:#dfe2eb;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .card{background:#1c2026;border:1px solid #2a2f38;border-radius:20px;padding:36px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
  .logo{width:64px;height:64px;background:#1a3040;border:1px solid rgba(34,211,238,0.2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px;}
  h1{font-size:22px;font-weight:700;margin-bottom:8px;}
  p{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:24px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;margin-bottom:12px;}
  .btn-google{background:#fff;color:#1a1a1a;}
  .btn-google:hover{background:#f5f5f5;}
  .btn-twitter{background:#1da1f2;color:#fff;}
  .btn-twitter:hover{background:#1a91da;}
  .btn-discord{background:#5865f2;color:#fff;}
  .btn-discord:hover{background:#4752c4;}
  .btn-email{background:#22d3ee;color:#0f172a;}
  .btn-email:hover{background:#06b6d4;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:#475569;font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#2a2f38;}
  #status{margin-top:16px;padding:12px;border-radius:10px;font-size:12px;display:none;}
  #status.loading{background:#1a2a3a;color:#22d3ee;display:block;}
  #status.success{background:#0f2a1a;color:#4ade80;display:block;}
  #status.error{background:#2a1015;color:#f87171;display:block;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(34,211,238,0.3);border-top-color:#22d3ee;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .email-form{display:none;margin-top:16px;}
  .email-form.active{display:block;}
  input[type=email]{width:100%;padding:12px;background:#0f1620;border:1px solid #2a2f38;border-radius:10px;color:#dfe2eb;font-size:14px;margin-bottom:10px;outline:none;}
  input[type=email]:focus{border-color:#22d3ee;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🤖</div>
  <h1>Connect with Web3Auth</h1>
  <p>Sign in to SubBot using your preferred social account. No seed phrases. No extensions.</p>

  <button class="btn btn-google" id="btn-google" onclick="login('google')">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>

  <button class="btn btn-twitter" id="btn-twitter" onclick="login('twitter')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    Continue with X (Twitter)
  </button>

  <button class="btn btn-discord" id="btn-discord" onclick="login('discord')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Continue with Discord
  </button>

  <div class="divider">or</div>

  <button class="btn btn-email" id="btn-email" onclick="toggleEmailForm()">
    ✉️ Continue with Email
  </button>

  <div class="email-form" id="email-form">
    <input type="email" id="email-input" placeholder="your@email.com"/>
    <button class="btn btn-email" onclick="loginWithEmail()">Send Magic Link</button>
  </div>

  <div id="status"></div>
</div>

<script>
const CLIENT_ID = 'BCkzpmFTjh9pTHe7LGNlrg_jo22W7DNHGkkZSbgrQlOeSf7AzRZ1qdZXDRyxplEq5knOTiCjhH-uga6tpnASP1o';
const CHAIN_CONFIG = {
  chainNamespace: 'eip155',
  chainId: '0xa4ec',
  rpcTarget: 'https://forno.celo.org',
  displayName: 'Celo Mainnet',
  blockExplorer: 'https://celoscan.io',
  ticker: 'CELO',
  tickerName: 'CELO',
};

let web3auth = null;

function setStatus(msg, type = 'loading') {
  const el = document.getElementById('status');
  el.className = type;
  el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
  el.style.display = 'block';
}

function disableButtons(disabled) {
  ['btn-google', 'btn-twitter', 'btn-discord', 'btn-email'].forEach(id => {
    document.getElementById(id).disabled = disabled;
  });
}

function toggleEmailForm() {
  document.getElementById('email-form').classList.toggle('active');
}

async function initWeb3Auth() {
  if (web3auth) return web3auth;
  setStatus('Loading Web3Auth SDK…');

  const loadScript = src => new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });

  await loadScript('https://cdn.jsdelivr.net/npm/@web3auth/no-modal@9/dist/web3auth-no-modal.umd.min.js');
  await loadScript('https://cdn.jsdelivr.net/npm/@web3auth/openlogin-adapter@9/dist/openloginAdapter.umd.min.js');

  const { Web3Auth }        = window.Web3AuthNoModal;
  const { OpenloginAdapter } = window.OpenloginAdapter;

  web3auth = new Web3Auth({
    clientId: CLIENT_ID,
    chainConfig: CHAIN_CONFIG,
    web3AuthNetwork: 'sapphire_mainnet',
  });

  web3auth.configureAdapter(new OpenloginAdapter({
    adapterSettings: { network: 'sapphire_mainnet', uxMode: 'popup' },
  }));

  await web3auth.init();
  return web3auth;
}

function storeAndBroadcast(w3a) {
  // Persist in localStorage for the opener page to read
  localStorage.setItem('web3auth', JSON.stringify(w3a));

  // Notify the opener tab via BroadcastChannel
  try {
    const bc = new BroadcastChannel('web3auth_result');
    bc.postMessage(w3a);
    bc.close();
  } catch (_) {}

  // Also try postMessage to opener (fallback)
  try {
    if (window.opener) window.opener.postMessage({ type: 'web3auth_result', data: w3a }, '*');
  } catch (_) {}
}

async function login(provider) {
  disableButtons(true);
  setStatus(`Connecting with ${provider}…`);

  try {
    const w3a = await initWeb3Auth();
    if (w3a.connected) await w3a.logout();

    await w3a.connectTo('openlogin', { loginProvider: provider });

    const info    = await w3a.getUserInfo();
    const payload = {
      idToken:      info.idToken,
      email:        info.email        || '',
      name:         info.name         || '',
      profileImage: info.profileImage || '',
      verifier:     info.verifier     || provider,
      verifierId:   info.verifierId   || info.email || '',
      loginAt:      Date.now(),
    };

    storeAndBroadcast(payload);
    setStatus(`✅ Logged in as ${info.name || info.email}`, 'success');
    setTimeout(() => window.close(), 1500);

  } catch (err) {
    console.error(err);
    const msg = err.message?.includes('user closed') ? 'Login cancelled.' : `Login failed: ${err.message}`;
    setStatus(`❌ ${msg}`, 'error');
    disableButtons(false);
  }
}

async function loginWithEmail() {
  const email = document.getElementById('email-input').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    setStatus('❌ Please enter a valid email address.', 'error');
    return;
  }
  disableButtons(true);
  setStatus(`Sending magic link to ${email}…`);

  try {
    const w3a = await initWeb3Auth();
    if (w3a.connected) await w3a.logout();

    await w3a.connectTo('openlogin', {
      loginProvider: 'email_passwordless',
      extraLoginOptions: { login_hint: email },
    });

    const info    = await w3a.getUserInfo();
    const payload = {
      idToken:      info.idToken,
      email:        info.email || email,
      name:         info.name  || email,
      profileImage: info.profileImage || '',
      verifier:     'email_passwordless',
      verifierId:   email,
      loginAt:      Date.now(),
    };

    storeAndBroadcast(payload);
    setStatus(`✅ Logged in as ${email}`, 'success');
    setTimeout(() => window.close(), 1500);

  } catch (err) {
    console.error(err);
    const msg = err.message?.includes('user closed') ? 'Login cancelled.' : `Login failed: ${err.message}`;
    setStatus(`❌ ${msg}`, 'error');
    disableButtons(false);
  }
}
</script>
</body>
</html>
